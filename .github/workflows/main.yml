name: Build Flipper Bible FAP
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ufbt
        run: pip install ufbt
      - name: Build FAP
        working-directory: bible
        run: ufbt
      - name: Upload bible_app.fap
        uses: actions/upload-artifact@v4
        with:
          name: bible_app.fap
          path: bible/dist/bible_app.fap
          if-no-files-found: error
